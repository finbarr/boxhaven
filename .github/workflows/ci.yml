name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
        continue-on-error: true

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Build backend
        run: npm --prefix backend run build

      - name: Test backend
        run: npm --prefix backend test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o bh ./cmd/bh
          ./bh version || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bh-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bh

  scripts:
    name: Scripts and Release Packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check shell syntax
        run: bash -n scripts/*.sh deploy/digitalocean/*.sh

      - name: Audit workflow actions
        run: scripts/audit-github-actions.sh

      - name: Check production env example fails validation
        run: |
          if scripts/validate-production-env.sh --env-file deploy/digitalocean/env.production.example; then
            echo "example production env unexpectedly passed validation" >&2
            exit 1
          fi

      - name: Run production fixture checks
        run: scripts/production-fixture-test.sh

      - name: Validate Caddy config
        run: scripts/validate-caddy-config.sh

      - name: Validate production Compose
        run: |
          tmp_env="$(mktemp)"
          cat > "$tmp_env" <<'EOF'
          ACME_EMAIL=ops@boxhaven.dev
          BOXHAVEN_APP_HOST=app.boxhaven.dev
          BOXHAVEN_API_HOST=api.boxhaven.dev
          BOXHAVEN_PREVIEW_BASE_DOMAIN=at.boxhaven.dev
          BOXHAVEN_APP_URL=https://app.boxhaven.dev
          BOXHAVEN_API_URL=https://api.boxhaven.dev
          BETTER_AUTH_URL=https://api.boxhaven.dev/v1/auth
          BETTER_AUTH_TRUSTED_ORIGINS=https://app.boxhaven.dev,https://api.boxhaven.dev
          BOXHAVEN_BACKEND_CORS_ORIGINS=https://app.boxhaven.dev,https://api.boxhaven.dev
          BETTER_AUTH_SECRET=0123456789abcdef0123456789abcdef
          BOXHAVEN_METRICS_BEARER_TOKEN=metrics-token-0123456789abcdef
          BOXHAVEN_SIGNUP_MODE=invite
          BOXHAVEN_SIGNUP_INVITE_CODES=invite-code-1
          DIGITALOCEAN_ACCESS_TOKEN=dop_v1_live_token_shape
          BOXHAVEN_REMOTE_IMAGE=230979614
          EOF
          scripts/validate-production-compose.sh --env-file "$tmp_env"

      - name: Build release archives
        run: VERSION=ci make dist

      - name: Verify release checksums
        run: cd dist && sha256sum -c checksums-ci.txt
