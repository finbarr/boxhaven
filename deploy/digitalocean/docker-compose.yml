services:
  backend:
    build:
      context: ../../backend
    image: boxhaven/backend:production
    restart: unless-stopped
    environment:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET to a long random value}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?set BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:?set BETTER_AUTH_TRUSTED_ORIGINS}
      BOXHAVEN_APP_URL: ${BOXHAVEN_APP_URL:?set BOXHAVEN_APP_URL}
      BOXHAVEN_API_URL: ${BOXHAVEN_API_URL:?set BOXHAVEN_API_URL}
      BOXHAVEN_BACKEND_CORS_ORIGINS: ${BOXHAVEN_BACKEND_CORS_ORIGINS:?set BOXHAVEN_BACKEND_CORS_ORIGINS}
      BOXHAVEN_PREVIEW_BASE_DOMAIN: ${BOXHAVEN_PREVIEW_BASE_DOMAIN:?set BOXHAVEN_PREVIEW_BASE_DOMAIN}
      BOXHAVEN_PREVIEW_TARGET_PORT: ${BOXHAVEN_PREVIEW_TARGET_PORT:-80}
      BOXHAVEN_PREVIEW_PROXY_TIMEOUT_SECONDS: ${BOXHAVEN_PREVIEW_PROXY_TIMEOUT_SECONDS:-30}
      BOXHAVEN_SIGNUP_MODE: ${BOXHAVEN_SIGNUP_MODE:-invite}
      BOXHAVEN_SIGNUP_ALLOWED_DOMAINS: ${BOXHAVEN_SIGNUP_ALLOWED_DOMAINS:-}
      BOXHAVEN_SIGNUP_INVITE_CODES: ${BOXHAVEN_SIGNUP_INVITE_CODES:?set BOXHAVEN_SIGNUP_INVITE_CODES for production signup}
      BOXHAVEN_MAX_MACHINES_PER_USER: ${BOXHAVEN_MAX_MACHINES_PER_USER:-3}
      BOXHAVEN_MAX_MACHINES_TOTAL: ${BOXHAVEN_MAX_MACHINES_TOTAL:-100}
      BOXHAVEN_MAINTENANCE_INTERVAL_SECONDS: ${BOXHAVEN_MAINTENANCE_INTERVAL_SECONDS:-60}
      BOXHAVEN_IDLE_MACHINE_TTL_HOURS: ${BOXHAVEN_IDLE_MACHINE_TTL_HOURS:-72}
      BOXHAVEN_STALE_CREATE_TTL_SECONDS: ${BOXHAVEN_STALE_CREATE_TTL_SECONDS:-1800}
      BOXHAVEN_BACKEND_LOG_REQUESTS: ${BOXHAVEN_BACKEND_LOG_REQUESTS:-1}
      BOXHAVEN_BACKEND_LISTEN: 0.0.0.0:8787
      BOXHAVEN_BACKEND_STATE: /data/backend.json
      BOXHAVEN_BACKEND_AUTH_DB: /data/auth.sqlite
      BOXHAVEN_SSH_CA_KEY: /data/ssh_ca_ed25519
      BOXHAVEN_BACKEND_PROVIDER: ${BOXHAVEN_BACKEND_PROVIDER:-digitalocean}
      DIGITALOCEAN_ACCESS_TOKEN: ${DIGITALOCEAN_ACCESS_TOKEN:?set DIGITALOCEAN_ACCESS_TOKEN for VM provisioning}
      DIGITALOCEAN_REGION: ${DIGITALOCEAN_REGION:-nyc3}
      DIGITALOCEAN_SIZE: ${DIGITALOCEAN_SIZE:-s-2vcpu-4gb-amd}
      BOXHAVEN_REMOTE_IMAGE: ${BOXHAVEN_REMOTE_IMAGE:-}
      DIGITALOCEAN_IMAGE: ${DIGITALOCEAN_IMAGE:-ubuntu-24-04-x64}
      DIGITALOCEAN_TAGS: ${DIGITALOCEAN_TAGS:-boxhaven}
      DIGITALOCEAN_VPC_UUID: ${DIGITALOCEAN_VPC_UUID:-}
    expose:
      - "8787"
    volumes:
      - /opt/boxhaven/data/backend:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
      BOXHAVEN_APP_HOST: ${BOXHAVEN_APP_HOST:?set BOXHAVEN_APP_HOST}
      BOXHAVEN_API_HOST: ${BOXHAVEN_API_HOST:?set BOXHAVEN_API_HOST}
      BOXHAVEN_PREVIEW_BASE_DOMAIN: ${BOXHAVEN_PREVIEW_BASE_DOMAIN:?set BOXHAVEN_PREVIEW_BASE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/boxhaven/data/caddy/data:/data
      - /opt/boxhaven/data/caddy/config:/config
