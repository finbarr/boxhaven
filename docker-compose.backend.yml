services:
  backend:
    build:
      context: ./backend
    image: boxhaven-backend:dev
    environment:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET to a long random value}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://127.0.0.1:8787/v1/auth}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://127.0.0.1:8787,http://127.0.0.1:5173,http://localhost:5173,https://app.boxhaven.dev}
      BOXHAVEN_APP_URL: ${BOXHAVEN_APP_URL:-http://127.0.0.1:8787}
      BOXHAVEN_API_URL: ${BOXHAVEN_API_URL:-http://127.0.0.1:8787}
      BOXHAVEN_BACKEND_CORS_ORIGINS: ${BOXHAVEN_BACKEND_CORS_ORIGINS:-http://127.0.0.1:8787,http://127.0.0.1:5173,http://localhost:5173,https://app.boxhaven.dev}
      BOXHAVEN_PREVIEW_BASE_DOMAIN: ${BOXHAVEN_PREVIEW_BASE_DOMAIN:-}
      BOXHAVEN_PREVIEW_TARGET_PORT: ${BOXHAVEN_PREVIEW_TARGET_PORT:-80}
      BOXHAVEN_BACKEND_LISTEN: 0.0.0.0:8787
      BOXHAVEN_BACKEND_STATE: /data/backend.json
      BOXHAVEN_BACKEND_AUTH_DB: /data/auth.sqlite
      BOXHAVEN_SSH_CA_KEY: /data/ssh_ca_ed25519
      BOXHAVEN_BACKEND_PROVIDER: ${BOXHAVEN_BACKEND_PROVIDER:-digitalocean}
      BOXHAVEN_ADMIN_EMAILS: ${BOXHAVEN_ADMIN_EMAILS:-}
      DIGITALOCEAN_ACCESS_TOKEN: ${DIGITALOCEAN_ACCESS_TOKEN:?set DIGITALOCEAN_ACCESS_TOKEN for VM provisioning}
      DIGITALOCEAN_REGION: ${DIGITALOCEAN_REGION:-nyc3}
      DIGITALOCEAN_SIZE: ${DIGITALOCEAN_SIZE:-s-2vcpu-4gb-amd}
      BOXHAVEN_REMOTE_IMAGE: ${BOXHAVEN_REMOTE_IMAGE:-}
      BOXHAVEN_REMOTE_IMAGE_DIGITALOCEAN: ${BOXHAVEN_REMOTE_IMAGE_DIGITALOCEAN:-}
      DIGITALOCEAN_IMAGE: ${DIGITALOCEAN_IMAGE:-ubuntu-24-04-x64}
      DIGITALOCEAN_TAGS: ${DIGITALOCEAN_TAGS:-boxhaven}
      DIGITALOCEAN_VPC_UUID: ${DIGITALOCEAN_VPC_UUID:-}
      HCLOUD_TOKEN: ${HCLOUD_TOKEN:-}
      HETZNER_LOCATION: ${HETZNER_LOCATION:-nbg1}
      HETZNER_SERVER_TYPE: ${HETZNER_SERVER_TYPE:-cpx22}
      HETZNER_IMAGE: ${HETZNER_IMAGE:-ubuntu-24.04}
      BOXHAVEN_REMOTE_IMAGE_HETZNER: ${BOXHAVEN_REMOTE_IMAGE_HETZNER:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_METER_EVENT_NAME: ${STRIPE_METER_EVENT_NAME:-boxhaven_box_hours}
      BOXHAVEN_FREE_MACHINES: ${BOXHAVEN_FREE_MACHINES:-1}
      BOXHAVEN_BILLING_USAGE_REPORTER: ${BOXHAVEN_BILLING_USAGE_REPORTER:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BOXHAVEN_EMAIL_FROM: ${BOXHAVEN_EMAIL_FROM:-}
    ports:
      - "${BOXHAVEN_BACKEND_PORT:-127.0.0.1:8787}:8787"
    volumes:
      - boxhaven-backend-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  boxhaven-backend-data:
